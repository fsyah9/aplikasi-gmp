
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Asset Management - GMP</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    
    <style>
        body { overscroll-behavior-y: contain; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .hidden { display: none !important; }
        .pb-safe { padding-bottom: max(16px, env(safe-area-inset-bottom)); }
        
        /* Custom Scrollbar for Desktop Tables */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Glassmorphism for Modals */
        .glass-overlay { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="bg-slate-50 h-[100dvh] w-screen overflow-hidden flex flex-col text-slate-800">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="flex-1 flex flex-col justify-center items-center p-6 z-50 relative bg-slate-100">
        <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-sm border border-slate-100">
            <div class="flex justify-center mb-6 text-[#0b336e]">
                <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
            </div>
            <h1 class="text-2xl font-bold text-center mb-2 text-[#0b336e]">GMP Asset System</h1>
            <p class="text-center text-slate-500 mb-8 text-sm">Masuk untuk mengelola data</p>
            <input type="text" id="username" placeholder="Username" class="w-full mb-4 p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#0b336e] focus:bg-white transition">
            <input type="password" id="password" placeholder="Password" class="w-full mb-8 p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#0b336e] focus:bg-white transition">
            <button onclick="login()" class="w-full bg-[#0b336e] text-white p-3.5 rounded-xl font-semibold shadow-lg hover:bg-[#072452] transition">Sign In</button>
        </div>
    </div>

    <!-- MAIN APP WRAPPER (Flex Row for Desktop Sidebar) -->
    <div id="main-app" class="hidden flex-1 flex flex-col md:flex-row w-full h-full">
        
        <!-- SIDEBAR (DESKTOP ONLY) -->
        <aside class="hidden md:flex flex-col w-72 bg-[#0b336e] text-white shadow-xl z-40 h-full">
            <div class="p-6 border-b border-white/10 flex items-center gap-3">
                <svg class="w-8 h-8 text-blue-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
                <span class="font-bold text-xl tracking-wide">GMP Asset</span>
            </div>
            <div class="p-6">
                <div class="flex items-center gap-4 mb-8 bg-white/5 p-4 rounded-xl border border-white/10">
                    <div class="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center font-bold text-white shadow-inner">FS</div>
                    <div>
                        <h3 class="font-bold text-sm leading-tight">Firman Syah</h3>
                        <p class="text-xs text-blue-200 mt-0.5">Product Data Manager</p>
                    </div>
                </div>
                <p class="text-xs text-blue-300/60 uppercase tracking-wider font-semibold mb-4 ml-2">Main Menu</p>
                <nav class="space-y-2">
                    <button onclick="switchTab('home')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-blue-100 hover:bg-white/10 hover:text-white transition group text-left">
                        <svg class="w-5 h-5 opacity-70 group-hover:opacity-100" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                        <span class="font-medium text-sm">Dashboard</span>
                    </button>
                    <button onclick="switchTab('inventory')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-blue-100 hover:bg-white/10 hover:text-white transition group text-left">
                        <svg class="w-5 h-5 opacity-70 group-hover:opacity-100" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                        <span class="font-medium text-sm">Asset & Inventory</span>
                    </button>
                    <button onclick="switchTab('counting')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-blue-100 hover:bg-white/10 hover:text-white transition group text-left">
                        <svg class="w-5 h-5 opacity-70 group-hover:opacity-100" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
                        <span class="font-medium text-sm">Counting & Scan</span>
                    </button>
                </nav>
            </div>
            <div class="mt-auto p-6 border-t border-white/10">
                <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-red-300 hover:bg-red-500 hover:text-white transition group text-left">
                    <svg class="w-5 h-5 opacity-70 group-hover:opacity-100" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    <span class="font-medium text-sm">Logout</span>
                </button>
            </div>
        </aside>

        <!-- KONTEN UTAMA -->
        <div class="flex-1 flex flex-col h-full overflow-hidden relative bg-slate-50">
            <!-- Header Mobile Sembunyi di Desktop -->
            <header class="md:hidden bg-[#0b336e] text-white p-4 shadow-md flex justify-between items-center shrink-0 z-20">
                <div class="flex items-center gap-2">
                    <svg class="w-6 h-6 text-blue-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
                    <span class="font-bold tracking-wide">GMP Asset</span>
                </div>
                <button onclick="logout()" class="p-2 text-blue-200 hover:text-white"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg></button>
            </header>

            <main class="flex-1 overflow-y-auto relative" id="content-area">
                <!-- Konten akan di-render di sini -->
            </main>

            <!-- BOTTOM NAV (MOBILE ONLY) -->
            <nav class="md:hidden bg-white border-t border-slate-200 flex justify-around px-2 pt-2 pb-safe shadow-[0_-4px_15px_rgba(0,0,0,0.05)] z-40 shrink-0">
                <button onclick="switchTab('home')" class="flex flex-col items-center p-2 flex-1 text-slate-400 focus:text-[#0b336e] active:text-[#0b336e]">
                    <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    <span class="text-[10px] font-medium">Home</span>
                </button>
                <button onclick="switchTab('inventory')" class="flex flex-col items-center p-2 flex-1 text-slate-400 focus:text-[#0b336e] active:text-[#0b336e]">
                    <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    <span class="text-[10px] font-medium">Assets</span>
                </button>
                <button onclick="switchTab('counting')" class="flex flex-col items-center p-2 flex-1 text-slate-400 focus:text-[#0b336e] active:text-[#0b336e]">
                    <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
                    <span class="text-[10px] font-medium">Scan</span>
                </button>
            </nav>
        </div>
    </div>

    <!-- MODAL FORM INVENTORY (ELEGANT DESIGN) -->
    <div id="modal-inventory" class="hidden fixed inset-0 glass-overlay z-50 flex justify-center items-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[95vh] flex flex-col border border-slate-100 relative">
            
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h3 id="modal-title" class="font-bold text-xl text-[#0b336e] tracking-tight">Add Asset</h3>
                <button onclick="closeModal('modal-inventory')" class="p-2 text-slate-400 hover:text-slate-600 bg-slate-50 hover:bg-slate-100 rounded-full transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="p-6 overflow-y-auto flex-1 space-y-5">
                <input type="hidden" id="inv-index">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Kode Barang</label>
                        <input type="text" id="inv-kode" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-[#0b336e] focus:bg-white outline-none text-sm transition" placeholder="FXA.01...">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Nama Barang</label>
                        <input type="text" id="inv-nama" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-[#0b336e] focus:bg-white outline-none text-sm transition" placeholder="Mesin / Kendaraan...">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Tahun Masuk</label>
                        <input type="number" id="inv-tahun" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-[#0b336e] focus:bg-white outline-none text-sm transition" placeholder="2023">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Stok / Qty</label>
                        <input type="number" id="inv-stok" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-[#0b336e] focus:bg-white outline-none text-sm transition" placeholder="1">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Harga Masuk (Rp)</label>
                        <input type="number" id="inv-harga" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-[#0b336e] focus:bg-white outline-none text-sm transition" placeholder="0">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Penyusutan (Rp)</label>
                        <input type="number" id="inv-penyusutan" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-[#0b336e] focus:bg-white outline-none text-sm transition" placeholder="0">
                    </div>
                </div>
                
                <!-- UPLOAD AREA WITH ELEGANT SVG ICON -->
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Foto Barang</label>
                    <div onclick="document.getElementById('inv-foto-input').click()" class="border-2 border-dashed border-slate-300 bg-slate-50 rounded-xl p-8 flex flex-col items-center justify-center cursor-pointer hover:bg-slate-100 transition hover:border-[#0b336e]">
                        <svg class="w-10 h-10 text-slate-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        <p class="text-sm text-slate-600 font-medium">Buka Kamera / Unggah Foto</p>
                    </div>
                    <input type="file" id="inv-foto-input" accept="image/*" capture="environment" class="hidden" onchange="previewImage(event)">
                    <div id="preview-container" class="hidden mt-4 relative">
                        <img id="inv-preview" class="w-full h-48 object-cover rounded-xl shadow-md border border-slate-200">
                        <button onclick="removeImage(event)" class="absolute top-3 right-3 bg-white/90 text-red-500 rounded-full w-8 h-8 flex items-center justify-center font-bold shadow-lg hover:bg-red-50 transition backdrop-blur">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="p-6 border-t border-slate-100 flex gap-3 bg-white rounded-b-2xl">
                <button onclick="closeModal('modal-inventory')" class="flex-1 px-4 py-3 rounded-xl font-semibold text-slate-600 bg-slate-100 hover:bg-slate-200 transition">Reset</button>
                <button onclick="saveInventory()" class="flex-[2] px-4 py-3 rounded-xl font-semibold text-white bg-[#0b336e] shadow-md hover:bg-[#072452] transition">Save Asset</button>
            </div>
        </div>
    </div>

    <!-- MODAL VIEW DETAIL -->
    <div id="modal-view" class="hidden fixed inset-0 glass-overlay z-50 flex justify-center items-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden border border-slate-100">
            <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="font-bold text-lg text-slate-800">Asset Detail</h3>
                <button onclick="closeModal('modal-view')" class="text-slate-400 hover:text-slate-600"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <div class="p-6" id="view-content"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzcBUCoFGpN9kcE7fNRY-atKAN-bvkcnu-I8eUAIhB8E1G_yD1ApRdG1vgwsRLMYlh1/exec'; 

        let currentUser = 'Firman Syah';
        let inventoryCache = []; 
        let countingList = [];   
        let html5QrCode = null;  
        let tempBase64Image = ''; 

        const formatRupiah = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka || 0);

        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if (!user || !pass) return;
            // Simulasi bypass login untuk testing UI
            currentUser = 'Firman Syah';
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            switchTab('home'); 
            loadInventoryCache(); 
        }

        function logout() { location.reload(); } 

        function switchTab(tab) {
            const content = document.getElementById('content-area');
            if (html5QrCode && html5QrCode.isScanning) html5QrCode.stop().catch(e=>console.log(e));

            if (tab === 'home') {
                content.innerHTML = `
                    <!-- Mobile Top Section (Dashboard Style) -->
                    <div class="md:hidden bg-[#0b336e] pt-6 pb-20 px-6 text-white rounded-b-[2rem] relative shadow-lg">
                        <div class="flex items-center justify-between mb-6">
                            <div class="flex items-center gap-4">
                                <div class="w-14 h-14 rounded-full bg-blue-100 text-[#0b336e] flex items-center justify-center font-bold text-xl border-2 border-white">FS</div>
                                <div>
                                    <h2 class="font-bold text-lg leading-tight">${currentUser}</h2>
                                    <p class="text-sm text-blue-200">Product Data Manager</p>
                                </div>
                            </div>
                            <button class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center text-white relative">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                                <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border border-[#0b336e]"></span>
                            </button>
                        </div>
                    </div>

                    <!-- Mobile Content overlapping the blue header -->
                    <div class="md:hidden px-6 -mt-12 relative z-10 mb-8">
                        <div class="bg-white rounded-2xl shadow-md p-4 mb-6 border border-slate-100 flex items-center gap-4">
                            <div class="bg-amber-100 p-3 rounded-xl text-amber-600">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                            </div>
                            <div class="flex-1">
                                <h4 class="text-sm font-bold text-slate-800">Cek Jadwal Maintenance</h4>
                                <p class="text-xs text-slate-500 mt-0.5">Segera laporkan aset rusak</p>
                            </div>
                            <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        </div>

                        <!-- Menu Grid (Mobile) -->
                        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-6">
                            <h3 class="text-sm font-bold text-slate-800 mb-4">Akses Cepat</h3>
                            <div class="grid grid-cols-4 gap-y-6 gap-x-2">
                                <div onclick="switchTab('inventory')" class="flex flex-col items-center gap-2 cursor-pointer group">
                                    <div class="w-12 h-12 rounded-2xl bg-slate-50 group-hover:bg-blue-50 text-[#0b336e] flex items-center justify-center transition border border-slate-100">
                                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                                    </div>
                                    <span class="text-[10px] font-medium text-slate-600 text-center">Data Aset</span>
                                </div>

        function filterInventory() {
            const val = document.getElementById('search-inv').value.toLowerCase();
            const filtered = inventoryCache.filter(i => 
                i.KodeBarang.toLowerCase().includes(val) || 
                i.NamaBarang.toLowerCase().includes(val)
            );
            renderInventoryList(filtered);
        }

        // Logic Modal Inventory SAMA, hanya ID nya disesuaikan
        function openFormInventory(index = null) {
            const modal = document.getElementById('modal-inventory');
            const title = document.getElementById('modal-title');
            tempBase64Image = ''; removeImage();

            if (index !== null) {
                const item = inventoryCache[index];
                title.innerText = "Edit Asset";
                document.getElementById('inv-index').value = index;
                document.getElementById('inv-kode').value = item.KodeBarang;
                document.getElementById('inv-kode').readOnly = true;
                document.getElementById('inv-kode').classList.add('opacity-70', 'cursor-not-allowed');
                document.getElementById('inv-nama').value = item.NamaBarang;
                document.getElementById('inv-stok').value = item.Stok || 0;
                document.getElementById('inv-tahun').value = item.TahunMasuk || '';
                document.getElementById('inv-harga').value = item.HargaMasuk || '';
                document.getElementById('inv-penyusutan').value = item.HargaPenyusutan || '';
                
                if(item.Gambar) {
                    tempBase64Image = item.Gambar;
                    document.getElementById('inv-preview').src = tempBase64Image;
                    document.getElementById('preview-container').classList.remove('hidden');
                }
            } else {
                title.innerText = "Add Asset";
                document.getElementById('inv-index').value = '';
                document.getElementById('inv-kode').value = '';
                document.getElementById('inv-kode').readOnly = false;
                document.getElementById('inv-kode').classList.remove('opacity-70', 'cursor-not-allowed');
                document.getElementById('inv-nama').value = '';
                document.getElementById('inv-stok').value = '';
                document.getElementById('inv-tahun').value = new Date().getFullYear();
                document.getElementById('inv-harga').value = '';
                document.getElementById('inv-penyusutan').value = '';
            }
            modal.classList.remove('hidden');
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                tempBase64Image = e.target.result;
                document.getElementById('inv-preview').src = tempBase64Image;
                document.getElementById('preview-container').classList.remove('hidden');
            }
            reader.readAsDataURL(file);
        }

        function removeImage(e) {
            if(e) e.stopPropagation();
            tempBase64Image = '';
            document.getElementById('inv-foto-input').value = '';
            document.getElementById('preview-container').classList.add('hidden');
            document.getElementById('inv-preview').src = '';
        }

                NamaBarang: document.getElementById('inv-nama').value,
                Stok: document.getElementById('inv-stok').value,
                TahunMasuk: document.getElementById('inv-tahun').value,
                HargaMasuk: document.getElementById('inv-harga').value,
                HargaPenyusutan: document.getElementById('inv-penyusutan').value,
                Gambar: tempBase64Image
            };
            if(!payload.KodeBarang || !payload.NamaBarang) return alert("Kode & Nama wajib diisi!");
            const idx = document.getElementById('inv-index').value;
            if(idx !== '') inventoryCache[idx] = payload;
            else inventoryCache.unshift(payload);
            closeModal('modal-inventory');
            renderInventoryList();
        }

        function deleteItem(kode) {
            if(!confirm(`Delete asset ${kode}?`)) return;
            inventoryCache = inventoryCache.filter(i => i.KodeBarang != kode);
            renderInventoryList();
        }

        function viewItem(item) {
            const imgStr = item.Gambar ? `<img src="${item.Gambar}" class="w-full h-48 object-cover mb-6 rounded-xl border border-slate-100 shadow-sm">` : `<div class="w-full h-40 bg-slate-100 rounded-xl mb-6 flex items-center justify-center text-slate-400 border border-slate-200"><svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg></div>`;
            document.getElementById('view-content').innerHTML = `
                ${imgStr}
                <div>
                    <p class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-1">Nama Asset</p>
                    <p class="font-bold text-slate-800 text-lg leading-tight mb-4">${item.NamaBarang}</p>
                    <div class="grid grid-cols-2 gap-y-4 gap-x-2 border-t border-slate-100 pt-4">
                        <div><p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">No. Aktiva (Kode)</p><p class="font-mono text-sm font-semibold text-[#0b336e] bg-blue-50 inline-block px-1.5 py-0.5 rounded mt-1">${item.KodeBarang}</p></div>
                        <div><p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Tahun Masuk</p><p class="text-sm font-semibold text-slate-700 mt-1">${item.TahunMasuk || '-'}</p></div>
                        <div><p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Qty / Stok</p><p class="text-sm font-semibold text-slate-700 mt-1">${item.Stok || 0} Unit</p></div>
                    </div>
                    <div class="mt-4 bg-slate-50 p-4 rounded-xl border border-slate-100">
                        <div class="flex justify-between items-center mb-2 pb-2 border-b border-slate-200">
                            <span class="text-xs text-slate-500 font-medium">Harga Masuk</span><span class="text-sm font-bold text-slate-800">${formatRupiah(item.HargaMasuk)}</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-xs text-slate-500 font-medium">Harga Susut</span><span class="text-sm font-bold text-red-600">${formatRupiah(item.HargaPenyusutan)}</span>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('modal-view').classList.remove('hidden');
        }

        function shareWA(kode, nama) {
            window.open(`https://wa.me/?text=${encodeURIComponent(`*Asset Management GMP*\nKode: ${kode}\nNama: ${nama}\n\nMohon cek aset terkait.`)}`, '_blank');
        }

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // Scanner Logic
        function toggleScanner() {
            const btn = document.getElementById('btn-scan');
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().then(() => {
                    btn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg> Start Camera`;
                    btn.classList.replace('bg-red-600', 'bg-[#0b336e]');
                    btn.classList.replace('hover:bg-red-700', 'hover:bg-[#072452]');
                });
            } else {
                if(!html5QrCode) html5QrCode = new Html5Qrcode("reader");
                html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 100 } },
                    (decodedText) => { processScannedCode(decodedText); if("vibrate" in navigator) navigator.vibrate(200); },
                    (err) => {}
                ).then(() => {
                    btn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> Stop Scan`;
                    btn.classList.replace('bg-[#0b336e]', 'bg-red-600');
                    btn.classList.replace('hover:bg-[#072452]', 'hover:bg-red-700');
                }).catch(() => alert("Akses kamera ditolak."));
            }
        }

        function searchManual() {
            const input = document.getElementById('manual-code');
            if(input.value) processScannedCode(input.value.trim());
            input.value = ''; 
        }

        function processScannedCode(kode) {
            if (kode.includes('http')) {
                const urlParts = kode.split('/'); kode = urlParts[urlParts.length - 1]; 
                if(kode.includes('?')) kode = kode.split('?')[0];
            }
            const item = inventoryCache.find(i => i.KodeBarang == kode || i.NamaBarang.toLowerCase().includes(kode.toLowerCase()));
            if (!item) return alert("Asset tidak ditemukan.");
            if (countingList.find(i => i.KodeBarang == item.KodeBarang)) return alert("Sudah ada di daftar.");

            countingList.unshift({ KodeBarang: item.KodeBarang, NamaBarang: item.NamaBarang, StokSistem: item.Stok, StokAktual: item.Stok });
            renderCountingList();
        }

        function renderCountingList() {
            const container = document.getElementById('counting-list');
            document.getElementById('count-total').innerText = `${countingList.length} Item`;

            if(countingList.length === 0) {
                container.innerHTML = '<p class="text-center text-slate-400 text-sm py-8 bg-white rounded-xl border border-dashed border-slate-200">Belum ada data scan.</p>';
                return;
            }

            let html = '';
            countingList.forEach((item, index) => {
                html += `
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm relative group">
                        <button onclick="removeItem(${index})" class="absolute -top-2 -right-2 text-white font-bold bg-slate-300 hover:bg-red-500 rounded-full w-6 h-6 flex justify-center items-center text-[10px] shadow transition">X</button>
                        <div class="mb-3">
                            <p class="font-bold text-sm text-slate-800">${item.NamaBarang}</p>
                            <p class="text-[10px] font-mono mt-0.5 text-[#0b336e] bg-blue-50 inline-block px-1 rounded">${item.KodeBarang}</p>
                        </div>
                        <div class="flex justify-between items-center bg-slate-50 p-2 rounded-lg border border-slate-100">
                            <div class="text-[11px] text-slate-500 font-medium">Sys: <span class="text-slate-800 text-sm ml-1">${item.StokSistem}</span></div>
                            <div class="flex items-center gap-2">
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Act:</span>
                                <input type="number" onchange="updateQty(${index}, this.value)" value="${item.StokAktual}" class="w-16 p-1.5 border border-slate-300 rounded-lg text-center text-sm font-bold focus:outline-none focus:border-[#0b336e] bg-white transition">
                            </div>
                        </div>
                    </div>`;
            });
            container.innerHTML = html;
        }

        function updateQty(index, newVal) { countingList[index].StokAktual = Number(newVal); }
        function removeItem(index) { countingList.splice(index, 1); renderCountingList(); }

        function downloadExcel() {
            if(countingList.length === 0) return alert("Belum ada data!");
            const dataToExport = countingList.map((item, i) => ({
                "No": i+1, "Kode": item.KodeBarang, "Nama": item.NamaBarang, "Sistem": item.StokSistem, "Aktual": item.StokAktual, "Selisih": item.StokAktual - item.StokSistem
            }));
            const ws = XLSX.utils.json_to_sheet(dataToExport);
            const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Counting");
            XLSX.writeFile(wb, `Scan_${new Date().getTime()}.xlsx`);
        }
        function saveFinal() { alert("Fitur sinkronisasi belum diaktifkan via backend."); }
    </script>
</body>
</html>
